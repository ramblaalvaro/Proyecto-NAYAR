<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAYAR — Registro de Dispositivos</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@300;400;600&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:    #040a10;
    --cyan:  #00e5ff;
    --cyan2: rgba(0,229,255,0.6);
    --red:   #ff3c3c;
    --green: #00ffb3;
    --text:  #a8c8d8;
    --muted: #2d5566;
    --mono:  'JetBrains Mono', monospace;
    --head:  'Bebas Neue', sans-serif;
    --body:  'Rajdhani', sans-serif;
  }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  body {
    background:var(--bg); color:var(--cyan); font-family:var(--body);
    min-height:100vh; overflow-x:hidden; cursor:crosshair;
  }
  canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }
  body::before {
    content:''; position:fixed; inset:0; z-index:1;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
    pointer-events:none; animation:scanMove 8s linear infinite;
  }
  @keyframes scanMove { 0%{background-position:0 0} 100%{background-position:0 100px} }
  body::after {
    content:''; position:fixed; left:0; right:0; height:2px;
    background:linear-gradient(90deg,transparent,var(--cyan2),transparent);
    z-index:2; pointer-events:none; animation:hScan 6s linear infinite; opacity:0.4;
  }
  @keyframes hScan { 0%{top:-10px;opacity:0} 5%{opacity:0.4} 95%{opacity:0.4} 100%{top:100vh;opacity:0} }

  /* ── LAYOUT ── */
  .page {
    position:relative; z-index:10;
    max-width:900px; margin:0 auto;
    padding:40px 24px 60px;
    animation:fadeIn 0.8s cubic-bezier(0.2,0,0,1) both;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

  /* ── HEADER ── */
  .top-bar {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:40px; padding-bottom:16px;
    border-bottom:1px solid rgba(0,229,255,0.1);
  }
  .logo-wrap { display:flex; align-items:center; gap:14px; }
  .logo-wrap svg { filter:drop-shadow(0 0 8px var(--cyan2)); }
  .logo-text h1 { font-family:var(--head); font-size:36px; letter-spacing:10px; color:var(--cyan); line-height:1; text-shadow:0 0 20px rgba(0,229,255,0.4); }
  .logo-text span { font-family:var(--mono); font-size:8px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; }
  .top-right { display:flex; align-items:center; gap:20px; }
  .clock { font-family:var(--mono); font-size:13px; color:rgba(0,229,255,0.4); letter-spacing:2px; }
  .btn-back { background:transparent; border:1px solid rgba(0,229,255,0.2); color:var(--muted); font-family:var(--mono); font-size:9px; letter-spacing:2px; padding:8px 14px; border-radius:3px; cursor:pointer; transition:all 0.2s; text-transform:uppercase; }
  .btn-back:hover { border-color:var(--cyan); color:var(--cyan); }

  /* ── STATS BAR ── */
  .stats { display:flex; gap:16px; margin-bottom:32px; }
  .stat-card {
    flex:1; padding:16px 20px;
    background:linear-gradient(160deg,rgba(13,34,54,0.95),rgba(4,10,16,0.98));
    border:1px solid rgba(0,229,255,0.12); border-radius:4px; position:relative;
  }
  .stat-card::before,.stat-card::after { content:''; position:absolute; width:8px; height:8px; border-color:var(--cyan); border-style:solid; }
  .stat-card::before { top:-1px; left:-1px; border-width:1px 0 0 1px; }
  .stat-card::after  { bottom:-1px; right:-1px; border-width:0 1px 1px 0; }
  .stat-label { font-family:var(--mono); font-size:8px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:6px; }
  .stat-value { font-family:var(--head); font-size:32px; letter-spacing:4px; color:var(--cyan); text-shadow:0 0 15px rgba(0,229,255,0.3); }

  /* ── FORM ── */
  .form-panel {
    padding:28px 28px 24px;
    background:linear-gradient(160deg,rgba(13,34,54,0.95),rgba(4,10,16,0.98));
    border:1px solid rgba(0,229,255,0.2); border-radius:4px; position:relative;
    margin-bottom:28px;
    box-shadow:0 0 0 1px rgba(0,229,255,0.05),0 10px 40px rgba(0,0,0,0.4);
  }
  .form-panel::before,.form-panel::after { content:''; position:absolute; width:12px; height:12px; border-color:var(--cyan); border-style:solid; }
  .form-panel::before { top:-1px; left:-1px; border-width:2px 0 0 2px; }
  .form-panel::after  { bottom:-1px; right:-1px; border-width:0 2px 2px 0; }
  .corner-tr,.corner-bl { position:absolute; width:12px; height:12px; border-color:var(--cyan); border-style:solid; }
  .corner-tr { top:-1px; right:-1px; border-width:2px 2px 0 0; }
  .corner-bl { bottom:-1px; left:-1px; border-width:0 0 2px 2px; }

  .panel-header { display:flex; align-items:center; gap:10px; margin-bottom:20px; padding-bottom:12px; border-bottom:1px solid rgba(0,229,255,0.08); }
  .status-dot { width:6px; height:6px; border-radius:50%; background:var(--cyan); box-shadow:0 0 8px var(--cyan); animation:blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .panel-title { font-family:var(--mono); font-size:9px; letter-spacing:2.5px; color:var(--text); text-transform:uppercase; flex:1; }
  .panel-id { font-family:var(--mono); font-size:8px; color:var(--muted); letter-spacing:1px; }

  .form-row { display:flex; gap:14px; }
  .field-group { flex:1; margin-bottom:0; }
  .field-label { font-family:var(--mono); font-size:8px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; margin-bottom:6px; display:block; transition:color 0.2s; }
  .field-group:focus-within .field-label { color:var(--cyan); }
  .field-input-wrap { position:relative; display:flex; align-items:center; }
  .field-icon { position:absolute; left:10px; color:var(--muted); font-size:11px; pointer-events:none; font-family:var(--mono); transition:color 0.2s; }
  .field-group:focus-within .field-icon { color:var(--cyan); }
  input {
    width:100%; padding:10px 12px 10px 30px;
    background:rgba(0,229,255,0.03); border:1px solid rgba(0,229,255,0.12);
    border-radius:3px; color:var(--cyan); font-family:var(--mono); font-size:13px;
    letter-spacing:1px; outline:none; transition:all 0.2s;
  }
  input::placeholder { color:var(--muted); font-size:11px; }
  input:focus { border-color:var(--cyan); background:rgba(0,229,255,0.05); box-shadow:0 0 0 3px rgba(0,229,255,0.08); }

  .btn-add {
    padding:10px 24px; background:transparent; border:1px solid var(--cyan);
    color:var(--cyan); font-family:var(--mono); font-size:11px; letter-spacing:3px;
    text-transform:uppercase; border-radius:3px; cursor:pointer; position:relative;
    overflow:hidden; transition:color 0.3s; white-space:nowrap; align-self:flex-end;
    height:40px; margin-top:20px;
  }
  .btn-add::before { content:''; position:absolute; inset:0; background:var(--cyan); transform:translateX(-101%); transition:transform 0.3s cubic-bezier(0.4,0,0.2,1); z-index:0; }
  .btn-add:hover::before { transform:translateX(0); }
  .btn-add:hover { color:#001820; }
  .btn-add span { position:relative; z-index:1; }
  .btn-add.loading { pointer-events:none; }
  .btn-add.loading span { opacity:0; }
  .btn-add.loading::after { content:''; position:absolute; inset:0; background:linear-gradient(90deg,transparent,var(--cyan2),transparent); background-size:200% 100%; animation:loadSlide 0.8s linear infinite; z-index:1; }
  @keyframes loadSlide { 0%{background-position:-100% 0} 100%{background-position:200% 0} }

  .form-feedback { margin-top:12px; font-family:var(--mono); font-size:9px; letter-spacing:2px; text-transform:uppercase; min-height:16px; }
  .form-feedback.error { color:var(--red); }
  .form-feedback.success { color:var(--green); }

  /* ── SEARCH ── */
  .search-wrap { position:relative; margin-bottom:16px; }
  .search-wrap .field-icon { top:50%; transform:translateY(-50%); }
  .search-wrap input { width:100%; }

  /* ── TABLE ── */
  .table-panel {
    background:linear-gradient(160deg,rgba(13,34,54,0.95),rgba(4,10,16,0.98));
    border:1px solid rgba(0,229,255,0.15); border-radius:4px; overflow:hidden;
    box-shadow:0 0 0 1px rgba(0,229,255,0.05),0 10px 40px rgba(0,0,0,0.4);
  }
  .table-header { display:flex; align-items:center; gap:10px; padding:16px 20px; border-bottom:1px solid rgba(0,229,255,0.08); }

  table { width:100%; border-collapse:collapse; }
  thead tr { border-bottom:1px solid rgba(0,229,255,0.08); }
  thead th { padding:12px 20px; text-align:left; font-family:var(--mono); font-size:8px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }
  tbody tr { border-bottom:1px solid rgba(0,229,255,0.04); transition:background 0.15s; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:rgba(0,229,255,0.03); }
  tbody td { padding:14px 20px; font-family:var(--mono); font-size:12px; color:var(--text); }
  .td-mac { color:var(--cyan); letter-spacing:2px; font-size:11px; }
  .td-name { color:var(--text); }
  .td-date { color:var(--muted); font-size:10px; }
  .td-actions { text-align:right; }

  .btn-delete {
    background:transparent; border:1px solid rgba(255,60,60,0.2); color:rgba(255,60,60,0.5);
    font-family:var(--mono); font-size:9px; letter-spacing:1px; padding:5px 10px;
    border-radius:3px; cursor:pointer; transition:all 0.2s; text-transform:uppercase;
  }
  .btn-delete:hover { border-color:var(--red); color:var(--red); box-shadow:0 0 8px rgba(255,60,60,0.2); }

  .empty-state { padding:50px 20px; text-align:center; }
  .empty-state p { font-family:var(--mono); font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; }

  .loading-state { padding:40px 20px; text-align:center; }
  .loading-state p { font-family:var(--mono); font-size:10px; letter-spacing:2px; color:var(--muted); text-transform:uppercase; animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="page">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="logo-wrap">
      <svg width="36" height="36" viewBox="0 0 44 44">
        <polygon points="22,3 39,12.5 39,31.5 22,41 5,31.5 5,12.5" fill="none" stroke="#00e5ff" stroke-width="1.2" opacity="0.5"/>
        <polygon points="22,8 34,15 34,29 22,36 10,29 10,15"        fill="none" stroke="#00e5ff" stroke-width="0.7" opacity="0.25"/>
        <circle cx="22" cy="22" r="3.5" fill="#00e5ff" opacity="0.9"/>
      </svg>
      <div class="logo-text">
        <h1>NAYAR</h1>
        <span>Registro de dispositivos</span>
      </div>
    </div>
    <div class="top-right">
      <span class="clock" id="clock">--:--:--</span>
      <button class="btn-back" onclick="window.location.href='loginpage.html'">← Panel</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Dispositivos registrados</div>
      <div class="stat-value" id="statTotal">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Último registro</div>
      <div class="stat-value" style="font-size:18px;padding-top:6px;letter-spacing:2px" id="statUltimo">--</div>
    </div>
  </div>

  <!-- FORM -->
  <div class="form-panel">
    <span class="corner-tr"></span><span class="corner-bl"></span>
    <div class="panel-header">
      <div class="status-dot"></div>
      <span class="panel-title">Registrar nuevo dispositivo</span>
      <span class="panel-id">SYS-REG-01</span>
    </div>
    <div class="form-row">
      <div class="field-group">
        <label class="field-label" for="inputMAC">Dirección MAC</label>
        <div class="field-input-wrap">
          <span class="field-icon">⬡</span>
          <input type="text" id="inputMAC" placeholder="AA:BB:CC:DD:EE:FF" maxlength="17" spellcheck="false">
        </div>
      </div>
      <div class="field-group">
        <label class="field-label" for="inputNombre">Nombre del dispositivo</label>
        <div class="field-input-wrap">
          <span class="field-icon">›_</span>
          <input type="text" id="inputNombre" placeholder="Ej: Portátil oficina" spellcheck="false">
        </div>
      </div>
      <button class="btn-add" id="btnAdd" onclick="agregarDispositivo()">
        <span>+ AÑADIR</span>
      </button>
    </div>
    <div class="form-feedback" id="formFeedback"></div>
  </div>

  <!-- TABLE -->
  <div class="table-panel">
    <div class="table-header">
      <div class="status-dot"></div>
      <span class="panel-title">Dispositivos registrados</span>
      <span class="panel-id" id="tableCount">0 entradas</span>
    </div>

    <!-- Buscador -->
    <div style="padding:12px 20px; border-bottom:1px solid rgba(0,229,255,0.06)">
      <div class="search-wrap field-input-wrap">
        <span class="field-icon" style="top:50%;transform:translateY(-50%)">🔍</span>
        <input type="text" id="inputSearch" placeholder="Buscar por MAC o nombre..." oninput="filtrar()" style="font-size:11px">
      </div>
    </div>

    <div id="tableBody">
      <div class="loading-state"><p>⟳ CARGANDO REGISTROS...</p></div>
    </div>
  </div>

</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, orderBy, query, onSnapshot }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyBeS6P3nlot17tEeHLPgjbkrlYKMPpiiNY",
    authDomain:        "nayar-29c5c.firebaseapp.com",
    projectId:         "nayar-29c5c",
    storageBucket:     "nayar-29c5c.firebasestorage.app",
    messagingSenderId: "531129648512",
    appId:             "1:531129648512:web:78d8f97658a52fdbea2d65"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  const col = collection(db, "dispositivos");

  let todosLosDispositivos = [];

  // ── Escucha en tiempo real ──
  const q = query(col, orderBy("fecha", "desc"));
  onSnapshot(q, (snapshot) => {
    todosLosDispositivos = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    renderTabla(todosLosDispositivos);
    actualizarStats(todosLosDispositivos);
  });

  // ── Añadir ──
  window.agregarDispositivo = async function() {
    const macRaw    = document.getElementById('inputMAC').value.trim().toUpperCase();
    const nombre    = document.getElementById('inputNombre').value.trim();
    const feedback  = document.getElementById('formFeedback');
    const btn       = document.getElementById('btnAdd');

    feedback.className = 'form-feedback';
    feedback.textContent = '';

    const macRegex = /^([0-9A-F]{2}:){5}[0-9A-F]{2}$/;
    if (!macRegex.test(macRaw)) {
      feedback.className = 'form-feedback error';
      feedback.textContent = '⚠ FORMATO MAC INVÁLIDO — EJ: AA:BB:CC:DD:EE:FF';
      return;
    }
    if (!nombre) {
      feedback.className = 'form-feedback error';
      feedback.textContent = '⚠ CAMPO REQUERIDO: NOMBRE';
      return;
    }
    // Verificar duplicado
    const existe = todosLosDispositivos.find(d => d.mac === macRaw);
    if (existe) {
      feedback.className = 'form-feedback error';
      feedback.textContent = '⚠ ESA DIRECCIÓN MAC YA ESTÁ REGISTRADA';
      return;
    }

    btn.classList.add('loading');
    try {
      await addDoc(col, {
        mac:    macRaw,
        nombre: nombre,
        fecha:  new Date().toISOString()
      });
      document.getElementById('inputMAC').value    = '';
      document.getElementById('inputNombre').value = '';
      feedback.className = 'form-feedback success';
      feedback.textContent = '✔ DISPOSITIVO REGISTRADO CORRECTAMENTE';
      setTimeout(() => { feedback.textContent = ''; }, 3000);
    } catch(e) {
      feedback.className = 'form-feedback error';
      feedback.textContent = '⚠ ERROR AL GUARDAR — INTENTA DE NUEVO';
    }
    btn.classList.remove('loading');
  };

  // ── Eliminar ──
  window.eliminarDispositivo = async function(id) {
    if (!confirm('¿Eliminar este dispositivo del registro?')) return;
    try {
      await deleteDoc(doc(db, "dispositivos", id));
    } catch(e) {
      alert('Error al eliminar');
    }
  };

  // ── Filtrar ──
  window.filtrar = function() {
    const q = document.getElementById('inputSearch').value.toLowerCase();
    const filtrados = todosLosDispositivos.filter(d =>
      d.mac.toLowerCase().includes(q) || d.nombre.toLowerCase().includes(q)
    );
    renderTabla(filtrados);
  };

  // ── Render tabla ──
  function renderTabla(lista) {
    const body = document.getElementById('tableBody');
    document.getElementById('tableCount').textContent = lista.length + ' entradas';

    if (lista.length === 0) {
      body.innerHTML = `<div class="empty-state"><p>⬡ SIN REGISTROS — AÑADE EL PRIMER DISPOSITIVO</p></div>`;
      return;
    }

    body.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Dirección MAC</th>
            <th>Nombre</th>
            <th>Fecha de registro</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${lista.map((d, i) => `
            <tr>
              <td style="color:var(--muted);font-size:10px">${String(i+1).padStart(2,'0')}</td>
              <td class="td-mac">${d.mac}</td>
              <td class="td-name">${d.nombre}</td>
              <td class="td-date">${formatFecha(d.fecha)}</td>
              <td class="td-actions">
                <button class="btn-delete" onclick="eliminarDispositivo('${d.id}')">✕ ELIMINAR</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  }

  // ── Stats ──
  function actualizarStats(lista) {
    document.getElementById('statTotal').textContent = lista.length;
    if (lista.length > 0) {
      const ultimo = lista[0];
      document.getElementById('statUltimo').textContent = ultimo.nombre;
    } else {
      document.getElementById('statUltimo').textContent = '--';
    }
  }

  // ── Formato fecha ──
  function formatFecha(iso) {
    if (!iso) return '--';
    const d = new Date(iso);
    return d.toLocaleDateString('es-ES') + ' ' + d.toTimeString().slice(0,5);
  }

  // ── Enter key ──
  ['inputMAC','inputNombre'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') window.agregarDispositivo();
    });
  });

  // ── Auto-formato MAC ──
  document.getElementById('inputMAC').addEventListener('input', function() {
    let v = this.value.replace(/[^0-9A-Fa-f]/g,'');
    let formatted = v.match(/.{1,2}/g)?.join(':') || v;
    if (formatted.length > 17) formatted = formatted.slice(0,17);
    this.value = formatted.toUpperCase();
  });
</script>

<!-- Fondo animado -->
<script>
  (function(){ const el=document.getElementById('clock'); setInterval(()=>{el.textContent=new Date().toTimeString().slice(0,8);},1000); })();
  (function(){
    const canvas=document.getElementById('bg'),ctx=canvas.getContext('2d');
    const GS=44,FADE=0.015,RADIUS=2; let W,H,nodes; const cellGlow=new Map();
    window.addEventListener('mousemove',e=>{
      const cx=Math.floor(e.clientX/GS),cy=Math.floor(e.clientY/GS);
      for(let dx=-RADIUS;dx<=RADIUS;dx++) for(let dy=-RADIUS;dy<=RADIUS;dy++){
        const d=Math.sqrt(dx*dx+dy*dy); if(d>RADIUS)continue;
        const k=`${cx+dx},${cy+dy}`; cellGlow.set(k,Math.min(1,Math.max(cellGlow.get(k)||0,1-d/(RADIUS+1))));
      }
    });
    function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; nodes=Array.from({length:55},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.35,vy:(Math.random()-0.5)*0.35,r:Math.random()*1.4+0.4})); }
    resize(); window.addEventListener('resize',resize);
    function draw(){
      ctx.clearRect(0,0,W,H);
      for(const[k,v]of cellGlow){const n=v-FADE;if(n<=0.001)cellGlow.delete(k);else cellGlow.set(k,n);}
      for(const[k,v]of cellGlow){
        const[col,row]=k.split(',').map(Number),px=col*GS,py=row*GS;
        if(px>W+GS||py>H+GS||px<-GS||py<-GS)continue;
        const g=ctx.createRadialGradient(px+GS/2,py+GS/2,0,px+GS/2,py+GS/2,GS*0.8);
        g.addColorStop(0,`rgba(0,229,255,${(v*0.18).toFixed(3)})`);g.addColorStop(0.5,`rgba(0,180,220,${(v*0.08).toFixed(3)})`);g.addColorStop(1,'rgba(0,100,160,0)');
        ctx.fillStyle=g;ctx.fillRect(px,py,GS,GS);
        ctx.strokeStyle=`rgba(0,229,255,${(v*0.35).toFixed(3)})`;ctx.lineWidth=0.8;ctx.strokeRect(px+.5,py+.5,GS-1,GS-1);
      }
      ctx.strokeStyle='rgba(0,229,255,0.04)';ctx.lineWidth=1;
      for(let x=0;x<=W;x+=GS){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
      for(let y=0;y<=H;y+=GS){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
      for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++){
        const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<110){ctx.strokeStyle=`rgba(0,229,255,${(0.07*(1-d/110)).toFixed(3)})`;ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.stroke();}
      }
      nodes.forEach(n=>{ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fillStyle='rgba(0,229,255,0.3)';ctx.fill();n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>W)n.vx*=-1;if(n.y<0||n.y>H)n.vy*=-1;});
      requestAnimationFrame(draw);
    }
    draw();
  })();
</script>
</body>
</html>
